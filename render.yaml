services:
  - type: web
    name: pipelineiq-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        sync: false
      - key: QDRANT_ENDPOINT
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_TOKEN
        sync: false

  - type: worker
    name: pipelineiq-worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python -m arq worker.WorkerSettings
    envVars:
      - key: REDIS_URL
        sync: false