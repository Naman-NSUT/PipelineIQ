name: CI/CD Classifier Regression

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  regression:
    name: LangSmith Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    env:
      GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
      QDRANT_HOST:             "localhost"
      QDRANT_PORT:             "6333"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install langchain-google-genai langgraph pydantic-settings



      - name: Run Demo Web App Tests
        run: pip install pytest fastapi httpx uvicorn && pytest test_agent_app/test_app.py > pytest.log 2>&1 || (cat pytest.log && exit 1)

      - name: Autonomous CI Repair Agent
        if: failure()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "PipelineIQ[bot]"
          git config --global user.email "pipelineiq@example.com"
          echo "PipelineIQ: Autonomously repairing failed pipeline..."
          jq -n --rawfile log pytest.log '{ci_logs: "", test_report: $log, file_tree: ["test_agent_app/app.py", "test_agent_app/test_app.py", "test_agent_app/index.html"], trigger_branch: "main"}' > agent_payload.json
          python -m ci_repair_agent.main agent_payload.json
