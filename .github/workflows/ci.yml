name: CI/CD Classifier Regression

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  regression:
    name: LangSmith Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      GEMINI_API_KEY:          ${{ secrets.GEMINI_API_KEY }}
      LANGCHAIN_API_KEY:       ${{ secrets.LANGCHAIN_API_KEY }}
      LANGCHAIN_TRACING_V2:    "true"
      LANGCHAIN_PROJECT:       "cicd-error-classifier"
      LANGCHAIN_ENDPOINT:      "https://api.smith.langchain.com"
      QDRANT_HOST:             "localhost"
      QDRANT_PORT:             "6333"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt --use-deprecated=legacy-resolver

      - name: Verify imports
        run: python -c "import ci_cd_analyzer.graph; print('Import OK')"

      - name: Run Demo Web App Tests
        run: pip install pytest fastapi httpx uvicorn && pytest test_agent_app/test_app.py > pytest.log 2>&1 || (cat pytest.log && exit 1)

      - name: Run regression suite
        run: python -m ci_cd_analyzer.eval_runner --threshold 0.90
        # Exits with code 1 if accuracy < 90%, failing the workflow

      - name: Autonomous CI Repair Agent
        if: failure()
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "PipelineIQ: Autonomously repairing failed pipeline..."
          pip check || pip install -r requirements.txt --ignore-installed
          jq -n --rawfile log pytest.log '{ci_logs: "", test_report: $log, file_tree: ["test_agent_app/app.py", "test_agent_app/test_app.py", "test_agent_app/index.html"], trigger_branch: "main"}' > agent_payload.json
          python -m ci_repair_agent.main agent_payload.json
